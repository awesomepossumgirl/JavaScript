<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red { color:red; }
        .green { color:green; }
        .aqua { color:aqua; }
    </style>
</head>
<body>
    <script>
        for(var i=1; i<=10; i++) {
            document.write("반복"+i,"<br>");
        }
    </script>
    <script>
        for(var j=1; j<=100; j++) {
            if(j%5==0&&j%7!=0) {
                document.write("<p class='red'>"+j+"</p>");
            } else if(j%7==0&&j%5!=0) {
                document.write("<p class='green'>"+j+"</p>")
            } else if(j%5==0&&j%7==0) {
                document.write("<p class='aqua'>"+j+"</p>")
            }
        }
    </script>
</body>
</html>
