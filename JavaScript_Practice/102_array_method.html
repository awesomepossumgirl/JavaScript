<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var arr_1 = ["사당", "교대", "방배", "강남"];
        var arr_2 = ["신사", "압구정", "옥수",];

        var result = arr_1.join("-");
        console.log(result);

        result = arr_1.concat(arr_2);
        console.log(result);

        result = arr_1.slice(1,3);
        console.log(result);

        console.log(arr_1.sort());
        console.log(arr_2.reverse());
    </script>
    <script>
        var greenArr = ["교대", "방배", "강남"];
        var yellowArr = ["미금", "정자", "수서"];
        greenArr.splice(2, 1, "서초", "역삼"); // 2번 인덱스부터 1개의 데이터를 삭제하고 "서초", "역삼" 삽입
        console.log(greenArr);

        var data1 = yellowArr.pop(); // 배열의 마지막 인덱스의 데이터를 data1에 저장
        var data2 = yellowArr.shift(); // 배열 가장 앞쪽 인덱스의 데이터를 data2에 저장
        
        yellowArr.push(data2); // data2에 저장된 데이터를 배열의 마지막 인덱스에 넣기
        console.log(yellowArr); 

        yellowArr.unshift(data1); //data1에 저장된 데이터를 배열의 가장 앞쪽 인덱스에 밀어 넣기
        console.log(yellowArr);
        
    </script>
</body>
</html>
