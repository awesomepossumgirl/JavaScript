<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var walkAmount = prompt("당신은 하루 몇 보 걷나요?", "0");
        
        if(walkAmount >= 1000) {
            document.write("매우 좋은 습관입니다!!", "<br>");
        }
        document.write("==============The End===============",)
    </script>
    <script>
        var min = prompt("당신의 하루 통화량은 몇 분 인가요?", "0")

        if(min>=60) { document.write("많이 사용하는 편이네요","<br>"); }
        document.write("==============The End===============")
    </script>
    <script>
        var userName = prompt("이름을 입력하세요","");
        
        if(userName) {
            document.write(userName+"님 반갑습니다. 방문을 환영합니다.");
        }
    </script>
</body>
</html>
