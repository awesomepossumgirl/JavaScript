<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var today = new Date();
        var nowMonth = today.getMonth(),
        nowDate = today.getDate(),
        nowDay = today.getDay();

        document.write("<h1>오늘 날짜 정보</h1>");
        document.write("오늘은 "+nowMonth+"월 "+nowDate+"일 "+nowDay+"요일입니다.");

        var worldcup = new Date(2002,4,31);
        var theMonth = worldcup.getMonth(),
        theDate = worldcup.getDate(),
        theDay = worldcup.getDay();

        document.write("<h1>월드컵 날짜 정보</h1>");
        document.write("2002월드컵 what Month? "+ theMonth, "<br>");
        document.write("2002월드컵 what Date? "+ theDate, "<br>");
        document.write("2002월드컵 what Day? "+ theDay, "<br>");
    </script>
</body>
</html>
